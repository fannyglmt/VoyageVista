<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hébergements - VoyageVista</title>

  <link rel="stylesheet" href="hebergements.css">
</head>

<body>

  <header class="navbar">
    <div class="logo">VoyageVista</div>

    <nav>
      <a href="#">Accueil</a>
      <a href="#">Destinations</a>
      <a href="#">Activités</a>
      <a href="#" class="active">Hébergements</a>
    </nav>
  </header>

  <section class="hero">
    <div class="overlay"></div>

    <div class="hero-content">
      <h1>Trouvez votre hébergement idéal</h1>
      <p>Hôtels, villas et resorts de rêve partout dans le monde.</p>
    </div>
  </section>

  <section class="filters">

    <select>
      <option>Destination</option>
      <option>Bali</option>
      <option>Maldives</option>
      <option>Paris</option>
    </select>

    <select>
      <option>Prix</option>
      <option>€</option>
      <option>€€</option>
      <option>€€€</option>
    </select>

    <select>
      <option>Étoiles</option>
      <option>3 ★</option>
      <option>4 ★</option>
      <option>5 ★</option>
    </select>

  </section>

  <section class="cards-container">

    <div class="hotel-card">
      <img src="images/hotel1.jpg" alt="hotel">

      <div class="card-content">
        <h2>Ocean Resort</h2>
        <p>Bali, Indonésie</p>

        <div class="infos">
          <span>★★★★★</span>
          <span>320€/nuit</span>
        </div>

        <button>Voir détails</button>
      </div>
    </div>

    <div class="hotel-card">
      <img src="images/hotel2.jpg" alt="hotel">

      <div class="card-content">
        <h2>Paradise Hotel</h2>
        <p>Maldives</p>

        <div class="infos">
          <span>★★★★☆</span>
          <span>410€/nuit</span>
        </div>

        <button>Voir détails</button>
      </div>
    </div>

    <div class="hotel-card">
      <img src="images/hotel3.jpg" alt="hotel">

      <div class="card-content">
        <h2>Skyline Suites</h2>
        <p>Paris, France</p>

        <div class="infos">
          <span>★★★★★</span>
          <span>280€/nuit</span>
        </div>

        <button>Voir détails</button>
      </div>
    </div>

  </section>

</body>
</html>
